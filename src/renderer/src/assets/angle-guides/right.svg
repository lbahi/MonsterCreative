<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="guide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(108,99,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(108,99,255,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Side view shape (mirrored) -->
  <polygon points="260,280 260,80 180,60 180,300" fill="url(#guide)" stroke="rgba(108,99,255,0.4)" stroke-width="2"/>
  <text x="200" y="160" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Outfit, sans-serif" font-size="14" font-weight="600">RIGHT SIDE</text>
  <path d="M220 100 L220 260" stroke="rgba(108,99,255,0.5)" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="200" y="340" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="DM Sans, sans-serif" font-size="11">Right side facing camera</text>
</svg>
