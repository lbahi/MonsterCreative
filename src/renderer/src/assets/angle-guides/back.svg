<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="guide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(108,99,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(108,99,255,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect x="120" y="40" width="160" height="240" rx="12" fill="url(#guide)" stroke="rgba(108,99,255,0.4)" stroke-width="2"/>
  <text x="200" y="160" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Outfit, sans-serif" font-size="14" font-weight="600">BACK VIEW</text>
  <!-- Dotted rectangle to suggest back -->
  <rect x="140" y="80" width="120" height="160" rx="4" fill="none" stroke="rgba(108,99,255,0.3)" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="200" y="340" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="DM Sans, sans-serif" font-size="11">Back side facing camera</text>
</svg>
