<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="guide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(108,99,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(108,99,255,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Top view shape (rectangle viewed from above) -->
  <rect x="110" y="100" width="180" height="140" rx="8" fill="url(#guide)" stroke="rgba(108,99,255,0.4)" stroke-width="2" transform="scale(1, 0.6) translate(0, 160)"/>
  <text x="200" y="160" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Outfit, sans-serif" font-size="14" font-weight="600">TOP VIEW</text>
  <!-- Perspective lines -->
  <line x1="150" y1="200" x2="250" y2="200" stroke="rgba(108,99,255,0.5)" stroke-width="2" stroke-dasharray="8 4"/>
  <line x1="200" y1="150" x2="200" y2="250" stroke="rgba(108,99,255,0.5)" stroke-width="2" stroke-dasharray="8 4"/>
  <circle cx="200" cy="200" r="25" fill="none" stroke="rgba(108,99,255,0.3)" stroke-width="2"/>
  <text x="200" y="340" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="DM Sans, sans-serif" font-size="11">Top of product facing camera</text>
</svg>
